<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Stories</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

/* HEADER */
header{background:pink;padding:12px;text-align:center;font-weight:bold;color:black}

/* BOOK LIST */
.books{padding:10px}
.book{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

/* CHAPTER */
.chapter{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:20px;
display:none;
overflow:auto;
}

.btn{
background:pink;
border:none;
padding:10px;
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>

</head>
<body>

<header>❤️ LOVE STORIES LIBRARY</header>

<div class="books">

<div class="book" onclick="openBook(0)">
<h3>📖 Mapenzi ya Kweli</h3>
<p>Story ya moyo na maisha...</p>
</div>

<div class="book" onclick="openBook(1)">
<h3>💔 Upendo na Maumivu</h3>
<p>Mapenzi yaliyojaa drama...</p>
</div>

</div>

<!-- READER -->
<div class="chapter" id="reader">
<button class="btn" onclick="closeBook()">❌ Close</button>

<h2 id="title"></h2>
<p id="content"></p>

<button class="btn" onclick="nextChapter()">➡️ Next</button>
</div>

<script>

/* BOOK DATA */
let books=[
{
title:"Mapenzi ya Kweli",
chapters:[
"Jovan alikutana naye siku ya mvua... moyo wake ulianza kubadilika.",
"Kila siku waliongea... mapenzi yakaanza kukua polepole.",
"Siku moja alitoweka... na hapo ndipo maumivu yalianza."
]
},
{
title:"Upendo na Maumivu",
chapters:[
"Alimpenda kwa dhati... lakini hakujua mwisho wake ungekuwa mgumu.",
"Alimsaliti... machozi yakaanza kumwagika.",
"Aliamua kuanza upya... maisha mapya yakaanza."
]
}
];

let currentBook=0;
let currentChapter=0;

/* OPEN */
function openBook(i){
currentBook=i;
currentChapter=0;

document.getElementById("reader").style.display="block";
showChapter();
}

/* SHOW */
function showChapter(){
let b=books[currentBook];

document.getElementById("title").innerText=b.title+" - Chapter "+(currentChapter+1);
document.getElementById("content").innerText=b.chapters[currentChapter];
}

/* NEXT */
function nextChapter(){
currentChapter++;

if(currentChapter>=books[currentBook].chapters.length){
alert("Mwisho wa story ❤️");
currentChapter=0;
}

showChapter();
}

/* CLOSE */
function closeBook(){
document.getElementById("reader").style.display="none";
}

</script>

</body>
</html>
