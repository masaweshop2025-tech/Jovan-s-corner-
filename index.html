<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Book</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

header{
background:blue;
padding:12px;
text-align:center;
font-weight:bold;
}

.container{
padding:15px;
line-height:1.6;
}

/* PAGE */
.page{
min-height:300px;
}

/* BUTTONS */
.controls{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

button{
flex:1;
padding:15px;
border:none;
background:blue;
color:white;
font-size:16px;
}
</style>

</head>
<body>

<header>📘 SAYANSI YA MAISHA</header>

<div class="container">
<h2 id="title"></h2>
<p id="content" class="page"></p>
</div>

<div class="controls">
<button onclick="prevPage()">⬅️ Back</button>
<button onclick="nextPage()">Next ➡️</button>
</div>

<script>

/* BOOK PAGES (ongeza hadi 100) */
let book=[

{
title:"Sura ya 1: Sayansi ni Nini?",
content:"Sayansi ni njia ya kuelewa dunia kupitia uchunguzi na majaribio. Inatusaidia kuelewa mambo kama mvua, mwili wa binadamu na teknolojia."
},

{
title:"Sura ya 2: Aina za Sayansi",
content:"Kuna aina nyingi za sayansi kama fizikia, kemia na baiolojia. Kila moja inaelezea sehemu tofauti ya maisha."
},

{
title:"Sura ya 3: Mwili wa Binadamu",
content:"Mwili wa binadamu una mifumo mingi kama mfumo wa damu, mfumo wa fahamu na mfumo wa chakula."
},

{
title:"Sura ya 4: Dunia",
content:"Dunia ni sayari tunayoishi. Ina bahari, ardhi na anga ambayo hutegemea maisha yetu."
},

{
title:"Sura ya 5: Teknolojia",
content:"Teknolojia ni matumizi ya sayansi kutengeneza vifaa kama simu, kompyuta na internet."
}

];

let page=0;

/* SHOW PAGE */
function showPage(){
document.getElementById("title").innerText=book[page].title;
document.getElementById("content").innerText=book[page].content;
}

/* NEXT */
function nextPage(){
if(page < book.length-1){
page++;
showPage();
}else{
alert("Mwisho wa kitabu 📘");
}
}

/* PREVIOUS */
function prevPage(){
if(page > 0){
page--;
showPage();
}
}

showPage();

</script>

</body>
</html>
