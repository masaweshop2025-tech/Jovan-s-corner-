<!DOCTYPE html>
<html>
<head>
<title>J&E Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* LOGO CONTAINER */
.logo-box{
display:flex;
justify-content:center;
align-items:center;
margin-top:20px;
}

/* ROTATING LOGO */
.logo{
width:120px;
height:120px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:14px;
text-align:center;
color:white;

background:linear-gradient(45deg,#ff00cc,#00ffff,#ff8c00);

animation:spin 6s linear infinite, glow 2s infinite alternate;
}

/* ROTATION */
@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* GLOW */
@keyframes glow{
0%{box-shadow:0 0 10px #ff00cc}
100%{box-shadow:0 0 30px #00ffff}
}

/* SLIDER */
.slider{
width:100%;
height:220px;
position:relative;
overflow:hidden;
margin-top:20px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-box">
<div class="logo">
JOVAN<br>&<br>EVANCE
</div>
</div>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<img src="jovan.jpg">
</div>

<div class="slide">
<img src="evance.jpg">
</div>

<div class="slide">
<img src="team.jpg">
</div>

</div>

<script>

/* AUTO SLIDE */
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

</script>

</body>
</html>
