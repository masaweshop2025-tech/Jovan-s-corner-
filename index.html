<!DOCTYPE html>
<html>
<head>
<title>J&E Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* LOGO BOX */
.logo-box{
display:flex;
justify-content:center;
align-items:center;
margin:20px;
}

/* ROTATING RING */
.ring{
width:130px;
height:130px;
border-radius:50%;
border:4px solid transparent;
border-top:4px solid #00ffff;
border-bottom:4px solid #ff00cc;
animation:spin 3s linear infinite;
display:flex;
justify-content:center;
align-items:center;
}

/* TEXT INSIDE */
.logo-text{
position:absolute;
font-weight:bold;
font-size:14px;
}

/* ROTATION */
@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* SLIDER */
.slider{
width:100%;
height:220px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo-box">
<div class="ring"></div>
<div class="logo-text">JOVAN & EVANCE</div>
</div>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<img src="jovan.jpg">
</div>

<div class="slide">
<img src="evance.jpg">
</div>

<div class="slide">
<img src="team.jpg">
</div>

</div>

<script>

/* AUTO SLIDE */
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

</script>

</body>
</html>
