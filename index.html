<!DOCTYPE html>
<html>
<head>
<title>J&E Hub</title>

<style>

/* BACKGROUND */
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#ff0080,#00ffff,#ff8c00,#3333ff);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

/* CONTAINER */
.container{padding:15px}

/* CARD */
.card{
background:rgba(0,0,0,0.5);
border-radius:15px;
padding:15px;
margin-bottom:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#ff00cc,#3333ff);
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MUSIC BOX */
.music{
position:fixed;
bottom:10px;
right:10px;
background:#000;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>💪 JOVAN & EVANCE HUB 🔥</header>

<div class="container">

<div class="card">
<h3>🤝 Brotherhood</h3>
<p>Rafiki wa kweli anakusimamia hata wengine wakikuacha.</p>
</div>

<div class="card">
<h3>❤️ Relationship</h3>
<p>Usikimbilie mapenzi bila kujijua kwanza bro...</p>
</div>

<div class="card">
<h3>🧠 Advice</h3>
<p>Focus na maisha yako, pesa itakuja baadaye 💯</p>
</div>

<!-- POST -->
<div class="card">
<h3>✍️ Post Something</h3>
<textarea id="text" style="width:100%;height:80px;"></textarea>
<button class="btn" onclick="post()">🚀 Post</button>
</div>

<div id="posts"></div>

</div>

<!-- MUSIC -->
<div class="music">
<button onclick="playMusic()">▶️</button>
<button onclick="pauseMusic()">⏸</button>
<input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
</div>

<audio id="bgmusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* POST */
function post(){
let t=document.getElementById("text").value;

if(t===""){
alert("Andika kitu bro");
return;
}

let post=`
<div class="card">
<h3>🔥 New Post</h3>
<p>${t}</p>
</div>
`;

document.getElementById("posts").innerHTML+=post;

document.getElementById("text").value="";
}

/* MUSIC */
let music=document.getElementById("bgmusic");

function playMusic(){
music.play();
}

function pauseMusic(){
music.pause();
}

function setVolume(v){
music.volume=v;
}

</script>

</body>
</html>
