<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan Farm Pro</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

header{background:green;padding:12px;text-align:center;font-weight:bold}

.container{padding:10px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.card{
background:#222;
border-radius:10px;
padding:10px;
text-align:center;
}

.btn{
background:green;
color:white;
border:none;
padding:10px;
border-radius:10px;
width:100%;
margin-top:10px;
}

.dashboard{
background:#000;
padding:10px;
margin-top:10px;
border-radius:10px;
}

/* IMAGES */
.images img{
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>

</head>
<body>

<header>🐄 JOVAN FARM PRO</header>

<div class="container">

<h3>Chagua Uwekezaji</h3>

<div class="grid">

<div class="card">
<h2>🐔 Kuku</h2>
<p>200,000 Tsh</p>
<button class="btn" onclick="invest('Kuku',200000)">Invest</button>
</div>

<div class="card">
<h2>🐄 Ng'ombe</h2>
<p>500,000 Tsh</p>
<button class="btn" onclick="invest('Ngombe',500000)">Invest</button>
</div>

</div>

<div class="dashboard">
<h3>📊 Dashboard</h3>
<p id="total">Total: 0 Tsh</p>
<p id="profit">Profit: 0 Tsh</p>
<div id="list"></div>

<button class="btn" onclick="withdraw()">💸 Withdraw</button>
</div>

<h3>📸 Live Farm Tracking</h3>

<div class="images" id="images"></div>

</div>

<script>

let investments=JSON.parse(localStorage.getItem("farm")||"[]");

/* INVEST */
function invest(type,amount){

let profit=amount*0.25;

let data={
type:type,
amount:amount,
profit:profit
};

investments.push(data);

localStorage.setItem("farm",JSON.stringify(investments));

updateUI();
}

/* UPDATE */
function updateUI(){

let total=0;
let profit=0;
let list="";

investments.forEach(i=>{
total+=i.amount;
profit+=i.profit;

list+=`<p>🐾 ${i.type} - ${i.amount} Tsh</p>`;
});

document.getElementById("total").innerText="Total: "+total+" Tsh";
document.getElementById("profit").innerText="Profit: "+profit+" Tsh";
document.getElementById("list").innerHTML=list;
}

/* WITHDRAW */
function withdraw(){

let profit=0;

investments.forEach(i=>{
profit+=i.profit;
});

if(profit===0){
alert("Hakuna pesa ya kutoa");
return;
}

alert("Umeomba withdraw ya "+profit+" Tsh");

investments=[];

localStorage.setItem("farm","[]");

updateUI();
}

/* LIVE IMAGES (random farm images) */
function loadImages(){

let imgs=[
"https://images.unsplash.com/photo-1601758123927-196f9c2d3f3d",
"https://images.unsplash.com/photo-1598514982846-0d3f7c3f5f9d",
"https://images.unsplash.com/photo-1607301406259-dfb186e15de8",
"https://images.unsplash.com/photo-1595433707802-6b2626ef1c14"
];

let html="";

imgs.forEach(i=>{
html+=`<img src="${i}">`;
});

document.getElementById("images").innerHTML=html;
}

/* AUTO REFRESH IMAGES */
setInterval(()=>{
loadImages();
},5000);

updateUI();
loadImages();

</script>

</body>
</html>
