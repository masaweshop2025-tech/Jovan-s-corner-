<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan News Ultimate</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

/* HEADER */
header{background:#b80000;padding:10px;text-align:center;font-weight:bold}

/* BREAKING */
.breaking{background:black;color:red;padding:8px;text-align:center}

/* TOP */
.topbar{display:flex;justify-content:space-between;padding:10px}

/* BUTTONS */
.buttons{display:flex;gap:5px;padding:10px;overflow:auto}
.buttons button{background:#222;color:white;border:none;padding:6px 10px;border-radius:10px}

/* SEARCH */
.search input{width:100%;padding:10px;border-radius:20px;border:none}

/* NEWS */
.news{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#222;border-radius:10px;overflow:hidden}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:10px;font-size:13px}

/* FULL */
.full{position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;display:none;overflow:auto}

.btn{background:red;color:white;border:none;padding:10px;width:100%;border-radius:10px;margin-top:10px}
</style>

</head>
<body>

<header id="titleText">📰 JOVAN NEWS ULTIMATE</header>

<div class="breaking" id="breaking">🚨 LIVE NEWS 🌍</div>

<div class="topbar">
<select onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="sw">Swahili</option>
<option value="fr">French</option>
<option value="zh">Chinese</option>
<option value="tr">Turkish</option>
</select>
</div>

<div class="buttons">
<button onclick="loadNews('general')">🌍 World</button>
<button onclick="loadNews('sports')">⚽ Sports</button>
<button onclick="loadNews('technology')">💻 Tech</button>
<button onclick="loadNews('business')">💰 Business</button>
<button onclick="loadTz()">🇹🇿 Tanzania</button>
</div>

<div class="search">
<input type="text" placeholder="Search..." onkeyup="searchNews(this.value)">
</div>

<p id="loading" style="text-align:center;color:yellow">⏳ Loading...</p>

<div class="news" id="news"></div>

<!-- FULL -->
<div class="full" id="full">
<button class="btn" onclick="closeFull()">❌ Close</button>
<h2 id="title"></h2>
<img id="image" style="width:100%">
<p id="content"></p>

<button class="btn" onclick="speakNews()">🔊 Read</button>
<button class="btn" onclick="saveNews()">⭐ Save</button>

<input id="commentInput" placeholder="Write comment..." style="width:100%;padding:10px;margin-top:10px">
<button class="btn" onclick="addComment()">💬 Comment</button>

<div id="comments"></div>
</div>

<script>

let API_KEY="b6ae304ceec443eb9b9ef709906bde7b";
let allNews=[];
let currentNews=null;

/* LOAD NEWS */
function loadNews(cat="general"){
let url=`https://newsapi.org/v2/top-headlines?country=us&category=${cat}&pageSize=6&apiKey=${API_KEY}`;
fetch("https://corsproxy.io/?"+encodeURIComponent(url))
.then(r=>r.json())
.then(d=>{
allNews=d.articles;
showNews(allNews);
document.getElementById("loading").style.display="none";
});
}

/* TANZANIA */
function loadTz(){
let url=`https://newsapi.org/v2/everything?q=Tanzania&sortBy=publishedAt&apiKey=${API_KEY}`;
fetch("https://corsproxy.io/?"+encodeURIComponent(url))
.then(r=>r.json())
.then(d=>{
allNews=d.articles;
showNews(allNews);
});
}

/* SHOW */
function showNews(data){
let html="";
data.forEach((n,i)=>{
html+=`
<div class="card" onclick="openFull(${i})">
<img src="${n.urlToImage || 'https://via.placeholder.com/300'}">
<h3>${n.title}</h3>
</div>
`;
});
document.getElementById("news").innerHTML=html;
}

/* SEARCH */
function searchNews(val){
let f=allNews.filter(n=>n.title.toLowerCase().includes(val.toLowerCase()));
showNews(f);
}

/* OPEN */
function openFull(i){
let n=allNews[i];
currentNews=n;

document.getElementById("full").style.display="block";
document.getElementById("title").innerText=n.title;
document.getElementById("image").src=n.urlToImage;

let text=n.content || n.description || "No full content";
document.getElementById("content").innerText=text;

loadComments();
}

/* CLOSE */
function closeFull(){
document.getElementById("full").style.display="none";
}

/* VOICE */
function speakNews(){
let msg=new SpeechSynthesisUtterance(currentNews.title + ". " + (currentNews.description||""));
speechSynthesis.speak(msg);
}

/* SAVE */
function saveNews(){
let saved=JSON.parse(localStorage.getItem("saved")||"[]");
saved.push(currentNews);
localStorage.setItem("saved",JSON.stringify(saved));
alert("Saved!");
}

/* COMMENTS */
function addComment(){
let text=document.getElementById("commentInput").value;
let comments=JSON.parse(localStorage.getItem("comments")||"[]");
comments.push(text);
localStorage.setItem("comments",JSON.stringify(comments));
loadComments();
}

function loadComments(){
let comments=JSON.parse(localStorage.getItem("comments")||"[]");
let html="";
comments.forEach(c=>{
html+=`<p>💬 ${c}</p>`;
});
document.getElementById("comments").innerHTML=html;
}

/* LANGUAGE */
function changeLang(l){
if(l=="sw"){
document.getElementById("titleText").innerText="📰 HABARI";
document.getElementById("breaking").innerText="🚨 HABARI MPYA";
}
if(l=="en"){
document.getElementById("titleText").innerText="📰 JOVAN NEWS";
document.getElementById("breaking").innerText="🚨 LIVE NEWS";
}
}

/* AUTO REFRESH */
setInterval(()=>{
loadNews();
},30000);

/* START */
loadNews();

</script>

</body>
</html>
