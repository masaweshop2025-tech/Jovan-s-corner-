<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Shoe Store</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* HEADER */
header {
  background:linear-gradient(90deg, red, blue, black);
  text-align:center;
  padding:15px;
  font-size:22px;
}

/* SEARCH */
.search {
  padding:10px;
  text-align:center;
}
.search input {
  padding:10px;
  width:80%;
  border-radius:10px;
  border:none;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#1f1f1f;
  border-radius:15px;
  padding:15px;
  text-align:center;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:yellow;
  font-size:18px;
}

/* BUTTON */
button {
  background:red;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* CART */
.cart {
  position:fixed;
  top:0;
  right:0;
  width:250px;
  height:100%;
  background:black;
  padding:15px;
  overflow:auto;
}

.cart h3 {
  text-align:center;
}

.total {
  color:yellow;
}

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background:black;
}
</style>

</head>

<body>

<header>
👟 JOVAN'S SHOE STORE
</header>

<div class="search">
<input type="text" placeholder="Search shoes..." onkeyup="search(this.value)">
</div>

<div class="container" id="products">

<div class="card" data-name="Nike Air Max">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Nike Air Max</h3>
<p class="price">120000</p>
<button onclick="addToCart('Nike Air Max',120000)">Add to Cart</button>
</div>

<div class="card" data-name="Adidas Sneakers">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c5c9f49">
<h3>Adidas Sneakers</h3>
<p class="price">95000</p>
<button onclick="addToCart('Adidas Sneakers',95000)">Add to Cart</button>
</div>

<div class="card" data-name="Puma Sport">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<h3>Puma Sport</h3>
<p class="price">85000</p>
<button onclick="addToCart('Puma Sport',85000)">Add to Cart</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<ul id="cart"></ul>
<p class="total">Total: <span id="total">0</span> Tsh</p>
<button onclick="order()">Order WhatsApp</button>
</div>

<footer>
© 2026 Jovan's Store | Nunua viatu bora 🔥
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push(name + " - " + price + " Tsh");
  total += price;

  let list = document.getElementById("cart");
  let li = document.createElement("li");
  li.textContent = name + " - " + price + " Tsh";
  list.appendChild(li);

  document.getElementById("total").textContent = total;
}

function order() {
  let message = "Order yangu:%0A" + cart.join("%0A") + "%0A Total: " + total + " Tsh";
  window.open("https://wa.me/255687273146?text=" + message);
}

function search(value) {
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    if(card.dataset.name.toLowerCase().includes(value.toLowerCase())) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
