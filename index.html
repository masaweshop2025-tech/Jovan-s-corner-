<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Corner</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}

/* HEADER */
header{background:linear-gradient(90deg,red,blue);padding:10px}
.top{display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;gap:10px;align-items:center}
.logo img{width:35px}

/* SLIDE TEXT */
.marquee{
overflow:hidden;
white-space:nowrap;
animation:slide 10s linear infinite;
color:yellow;
}
@keyframes slide{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* SEARCH */
.search input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:#111;
padding:10px;
border-radius:15px;
}
.card img{
width:100%;
border-radius:10px;
}
.card h3{color:yellow}

/* BUTTON */
.btn{
background:red;
border:none;
padding:10px;
width:100%;
border-radius:10px;
color:white;
}

/* CART */
.cart{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:350px;
height:100%;
background:black;
padding:15px;
transition:0.3s;
overflow:auto;
}
.cart.active{right:0}

/* OPTIONS */
.option{
border:1px solid #333;
padding:10px;
margin:5px 0;
border-radius:10px;
cursor:pointer;
}
.option.active{
border:2px solid red;
}

/* FLOAT BUTTON */
.float{
position:fixed;
top:10px;
right:10px;
background:red;
color:white;
padding:10px;
border-radius:50%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

/* DASHBOARD */
#dashboard{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
padding:20px;
overflow:auto;
}
</style>
</head>

<body>

<header>

<div class="top">

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
<b id="title">JOVAN'S CORNER</b>
</div>

<div>
<select onchange="changeLang(this.value)">
<option value="sw">🇹🇿 Sw</option>
<option value="en">🇬🇧 En</option>
<option value="tr">🇹🇷 Tr</option>
<option value="zh">🇨🇳 Zh</option>
<option value="es">🇪🇸 Es</option>
</select>

<button onclick="openDashboard()">📊</button>
</div>

</div>

<div class="marquee" id="welcome">
🔥 Karibu Jovan's Corner - Viatu bora 🔥
</div>

</header>

<div class="search">
<input type="text" placeholder="Tafuta viatu..." onkeyup="searchProduct(this.value)">
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">

<h2>🛒 Cart <span onclick="toggleCart()">❌</span></h2>

<div id="cartItems"></div>

<p>Items: <span id="count">0</span></p>
<p>Total: <span id="total">0</span> Tsh</p>

<h3>🚚 Delivery</h3>
<div class="option active" onclick="selectDelivery(this,0)">Free</div>
<div class="option" onclick="selectDelivery(this,5000)">City - 5000</div>

<h3>💳 Payment</h3>
<div class="option active" onclick="selectPayment(this,'mpesa')">M-Pesa</div>
<div class="option" onclick="selectPayment(this,'cash')">Cash</div>

<button class="btn" onclick="order()">Order Now</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Orders <span onclick="closeDashboard()">❌</span></h2>
<div id="history"></div>
</div>

<button class="float" onclick="toggleCart()">🛒</button>
<a href="https://wa.me/255617816758" class="whatsapp">💬</a>

<script>

/* PRODUCTS REAL */
let products=[
{name:"Nike Air Max",price:50000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Adidas Ultraboost",price:65000,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9f49"},
{name:"Puma RS-X",price:55000,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{name:"Jordan Retro",price:75000,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"},
{name:"Nike Zoom",price:45000,img:"https://images.unsplash.com/photo-1514989940723-e8e51635b782"},
{name:"Adidas Run",price:42000,img:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"}
];

let cart=[];
let delivery=0;
let payment="mpesa";

/* LOAD */
function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
loadProducts();

/* ADD */
function add(i){
cart.push(products[i]);
updateCart();
}

/* UPDATE */
function updateCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price;
html+=`<p>${p.name}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total+delivery;
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* DELIVERY */
function selectDelivery(el,price){
document.querySelectorAll("h3 + .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
delivery=price;
updateCart();
}

/* PAYMENT */
function selectPayment(el,type){
document.querySelectorAll("h3 + .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
payment=type;
}

/* ORDER */
function order(){
let text="ORDER:%0A";
cart.forEach(p=>{
text+=p.name+" - "+p.price+" Tsh%0A";
});
window.open("https://wa.me/255617816758?text="+text);
}

/* DASHBOARD */
function openDashboard(){
document.getElementById("dashboard").style.display="block";
}
function closeDashboard(){
document.getElementById("dashboard").style.display="none";
}

/* SEARCH */
function searchProduct(val){
let filtered=products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
let html="";
filtered.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* LANGUAGE */
function changeLang(lang){

if(lang=="sw"){
document.getElementById("welcome").innerText="🔥 Karibu Jovan's Corner 🔥";
document.querySelector(".search input").placeholder="Tafuta viatu...";
}

if(lang=="en"){
document.getElementById("welcome").innerText="🔥 Welcome to Jovan's Corner 🔥";
document.querySelector(".search input").placeholder="Search shoes...";
}

if(lang=="tr"){
document.getElementById("welcome").innerText="🔥 Hoşgeldiniz 🔥";
document.querySelector(".search input").placeholder="Ara...";
}

if(lang=="zh"){
document.getElementById("welcome").innerText="🔥 欢迎 🔥";
document.querySelector(".search input").placeholder="搜索...";
}

if(lang=="es"){
document.getElementById("welcome").innerText="🔥 Bienvenido 🔥";
document.querySelector(".search input").placeholder="Buscar...";
}

}

</script>
<!-- CHATBOT -->
<div id="chatbot" style="position:fixed;bottom:20px;left:20px;width:250px;background:#111;padding:10px;border-radius:10px;">
<h4>🤖 Chat Bot</h4>

<div id="chatBox" style="height:150px;overflow:auto;font-size:14px;"></div>

<input type="text" id="userInput" placeholder="Andika hapa..." style="width:100%;padding:5px;">
<button onclick="sendMsg()" style="width:100%;margin-top:5px;">Send</button>
</div>

<script>

function sendMsg(){
let input=document.getElementById("userInput").value.toLowerCase();
let chat=document.getElementById("chatBox");

chat.innerHTML += "<p>👤 "+input+"</p>";

let reply="Sijaelewa 🤔";

if(input.includes("bei")){
reply="Bei zetu zinaanzia 40,000 Tsh 👟";
}
else if(input.includes("order")){
reply="Bonyeza Add kisha Cart ku-order 🛒";
}
else if(input.includes("hello") || input.includes("hi")){
reply="Karibu sana Jovan's Corner 🔥";
}
else if(input.includes("delivery")){
reply="Delivery ni free au 5000 Tsh 🚚";
}

chat.innerHTML += "<p>🤖 "+reply+"</p>";

document.getElementById("userInput").value="";
chat.scrollTop = chat.scrollHeight;
}

</script>
</body>
</html>
