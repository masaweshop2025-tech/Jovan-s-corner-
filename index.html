<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Corner</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}

/* HEADER */
header{background:linear-gradient(90deg,red,blue);padding:10px}
.top{display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;gap:10px;align-items:center}
.logo img{width:35px}

/* MARQUEE */
.marquee{overflow:hidden;white-space:nowrap;animation:slide 10s linear infinite;color:yellow}
@keyframes slide{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* SEARCH */
.search input{width:100%;padding:10px;border-radius:20px;border:none}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;padding:10px;border-radius:15px}
.card img{width:100%;border-radius:10px}
.card h3{color:yellow}

/* RATING */
.stars{color:gold}

/* REVIEWS */
.review{font-size:12px;color:#ccc;margin-top:5px}

/* BUTTON */
.btn{background:red;border:none;padding:10px;width:100%;border-radius:10px;color:white}

/* CART */
.cart{position:fixed;right:-100%;top:0;width:100%;max-width:350px;height:100%;background:black;padding:15px;transition:0.3s}
.cart.active{right:0}

/* OPTIONS */
.option{border:1px solid #333;padding:10px;margin:5px 0;border-radius:10px}
.option.active{border:2px solid red}

/* FLOAT */
.float{position:fixed;top:10px;right:10px;background:red;color:white;padding:10px;border-radius:50%}

/* DASHBOARD */
#dashboard{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;overflow:auto}
</style>
</head>

<body>

<header>
<div class="top">
<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
<b id="title">JOVAN'S CORNER</b>
</div>

<div>
<select onchange="changeLang(this.value)">
<option value="sw">🇹🇿</option>
<option value="en">🇬🇧</option>
</select>

<button onclick="openDashboard()">📊</button>
</div>
</div>

<div class="marquee" id="welcome">
🔥 Karibu Jovan's Corner - Viatu bora 🔥
</div>
</header>

<div class="search">
<input type="text" placeholder="Tafuta..." onkeyup="searchProduct(this.value)">
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h2>🛒 Cart <span onclick="toggleCart()">❌</span></h2>

<div id="cartItems"></div>

<p>Items: <span id="count">0</span></p>
<p>Total: <span id="total">0</span> Tsh</p>

<h3>🚚 Delivery</h3>
<div class="option active" onclick="selectDelivery(this,0)">Free</div>
<div class="option" onclick="selectDelivery(this,5000)">City - 5000</div>

<h3>💳 Payment</h3>
<div class="option active" onclick="selectPayment(this,'mpesa')">M-Pesa</div>
<div class="option" onclick="selectPayment(this,'cash')">Cash</div>

<button class="btn" onclick="order()">Order</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Orders <span onclick="closeDashboard()">❌</span></h2>
<div id="history"></div>
</div>

<button class="float" onclick="toggleCart()">🛒</button>

<script>

/* PRODUCTS WITH REVIEWS */
let products=[
{
name:"Nike",
price:50000,
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
rating:5,
reviews:["Nzuri sana 🔥","Quality kali","Nimenunua mara 2"]
},
{
name:"Adidas",
price:60000,
img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9f49",
rating:4,
reviews:["Comfort sana","Nzuri kwa michezo"]
},
{
name:"Puma",
price:55000,
img:"https://images.unsplash.com/photo-1519741497674-611481863552",
rating:3,
reviews:["Bei nzuri","Simple design"]
},
{
name:"Jordan",
price:70000,
img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6",
rating:5,
reviews:["Original kabisa","Top quality 🔥"]
}
];

let cart=[];
let delivery=0;
let payment="mpesa";

/* STARS */
function getStars(num){
let s="";
for(let i=0;i<num;i++) s+="⭐";
return s;
}

/* LOAD */
function loadProducts(){
let html="";
products.forEach((p,i)=>{

let rev="";
p.reviews.forEach(r=>{
rev+=`<div class="review">💬 ${r}</div>`;
});

html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="stars">${getStars(p.rating)}</div>
${rev}
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
loadProducts();

/* ADD */
function add(i){
cart.push(products[i]);
updateCart();
}

/* UPDATE */
function updateCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price;
html+=`<p>${p.name} - ${p.price}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total+delivery;
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* DELIVERY */
function selectDelivery(el,price){
document.querySelectorAll("h3 + .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
delivery=price;
updateCart();
}

/* PAYMENT */
function selectPayment(el,type){
document.querySelectorAll("h3 + .option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
payment=type;
}

/* ORDER */
function order(){
let text="ORDER:%0A";
let save="";

cart.forEach(p=>{
text+=p.name+" - "+p.price+" Tsh%0A";
save+=p.name+" - "+p.price+" Tsh<br>";
});

let history=localStorage.getItem("orders")||"";
history+="<hr>"+save;
localStorage.setItem("orders",history);

document.getElementById("history").innerHTML=history;

window.open("https://wa.me/255617816758?text="+text);
}

/* DASHBOARD */
function openDashboard(){
document.getElementById("dashboard").style.display="block";
}
function closeDashboard(){
document.getElementById("dashboard").style.display="none";
}

window.onload=function(){
document.getElementById("history").innerHTML=localStorage.getItem("orders")||"No orders";
}

/* SEARCH */
function searchProduct(val){
let filtered=products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
let html="";
filtered.forEach((p,i)=>{

let rev="";
p.reviews.forEach(r=>{
rev+=`<div class="review">💬 ${r}</div>`;
});

html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="stars">${getStars(p.rating)}</div>
${rev}
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* LANGUAGE */
function changeLang(lang){
if(lang=="sw"){
document.getElementById("welcome").innerText="🔥 Karibu Jovan's Corner 🔥";
document.querySelector(".search input").placeholder="Tafuta...";
}
if(lang=="en"){
document.getElementById("welcome").innerText="🔥 Welcome to Jovan's Corner 🔥";
document.querySelector(".search input").placeholder="Search...";
}
}

</script>

</body>
</html>
