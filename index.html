<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan Game</title>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:sans-serif}

#game{
position:relative;
width:100%;
height:300px;
background:#111;
overflow:hidden;
margin-top:20px;
}

#player{
position:absolute;
bottom:0;
left:50px;
width:60px;
height:60px;
background-size:cover;
border-radius:50%;
}

#obstacle{
position:absolute;
bottom:0;
right:-50px;
width:40px;
height:40px;
background:red;
}

button{padding:10px;margin:5px}
</style>

</head>
<body>

<h2>🎮 Jovan vs Rafiki</h2>

<button onclick="selectPlayer('me.jpg')">Wewe</button>
<button onclick="selectPlayer('friend.jpg')">Rafiki</button>

<div id="game">
<div id="player"></div>
<div id="obstacle"></div>
</div>

<h3>Score: <span id="score">0</span></h3>

<script>

let player=document.getElementById("player");
let obstacle=document.getElementById("obstacle");

let jumping=false;
let score=0;

/* SELECT PLAYER */
function selectPlayer(img){
player.style.backgroundImage="url("+img+")";
}

/* JUMP */
document.addEventListener("click",()=>{
if(!jumping){
jumping=true;
let up=0;

let jump=setInterval(()=>{
up+=5;
player.style.bottom=up+"px";

if(up>=100){
clearInterval(jump);

let down=setInterval(()=>{
up-=5;
player.style.bottom=up+"px";

if(up<=0){
clearInterval(down);
jumping=false;
}

},20);

}

},20);

}
});

/* OBSTACLE MOVE */
function moveObstacle(){
let pos=window.innerWidth;

let move=setInterval(()=>{
pos-=5;
obstacle.style.right=(window.innerWidth-pos)+"px";

let playerBottom=parseInt(player.style.bottom)||0;

if(pos<100 && playerBottom<40){
alert("💀 Game Over");
location.reload();
}

if(pos<0){
pos=window.innerWidth;
score++;
document.getElementById("score").innerText=score;
}

},20);
}

moveObstacle();

</script>

</body>
</html>
