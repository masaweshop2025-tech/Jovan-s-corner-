<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Shoe Store</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0a0a;
  color:white;
}

header{
  background:linear-gradient(45deg, red, blue);
  padding:15px;
  text-align:center;
  font-size:22px;
}

/* SEARCH */
.search{
  padding:10px;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  color:yellow;
}

/* BUTTON */
.btn{
  background:red;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  color:white;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:red;
  padding:10px;
  border-radius:50%;
  z-index:1000;
}

/* CART */
.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  max-width:320px;
  height:100%;
  background:#0b0b0b;
  padding:15px;
  transition:0.4s;
  box-shadow:-5px 0 15px rgba(0,0,0,0.7);
  border-left:2px solid red;
  overflow:auto;
  z-index:1000;
}

.cart.active{
  right:0;
}

.total{
  color:yellow;
  font-size:18px;
}

/* OPTIONS */
.option{
  background:#111;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #333;
}

.option.active{
  border:2px solid red;
}

/* QTY */
.qty button{
  padding:5px;
  margin:3px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:black;
}
</style>

</head>

<body>

<header>👟 JOVAN'S SHOE STORE</header>

<button class="cart-btn" onclick="toggleCart()">🛒</button>

<div class="search">
<input placeholder="Search shoes..." onkeyup="search(this.value)">
</div>

<div class="products" id="products">

<div class="card" data-name="Nike">
<img src="https://picsum.photos/200?1">
<h3>Nike</h3>
<p>50000 Tsh</p>
<button class="btn" onclick="addToCart('Nike',50000)">Add</button>
</div>

<div class="card" data-name="Adidas">
<img src="https://picsum.photos/200?2">
<h3>Adidas</h3>
<p>60000 Tsh</p>
<button class="btn" onclick="addToCart('Adidas',60000)">Add</button>
</div>

<div class="card" data-name="Puma">
<img src="https://picsum.photos/200?3">
<h3>Puma</h3>
<p>40000 Tsh</p>
<button class="btn" onclick="addToCart('Puma',40000)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">

<div style="display:flex;justify-content:space-between;">
<h2>🛒 Cart</h2>
<button onclick="toggleCart()" style="background:none;color:white;border:none;font-size:20px;">❌</button>
</div>

<div id="items"></div>

<p>Items: <span id="count">0</span></p>
<p class="total">Total: <span id="total">0</span> Tsh</p>

<hr>

<h3>🚚 Delivery</h3>

<div class="option active" onclick="selectDelivery('Free', this)">
Free Delivery
</div>

<div class="option" onclick="selectDelivery('5000 Tsh', this)">
City Delivery - 5000 Tsh
</div>

<h3>💳 Payment</h3>

<div class="option active" onclick="selectPayment('M-Pesa', this)">
M-Pesa 📲
</div>

<div class="option" onclick="selectPayment('Cash', this)">
Cash on Delivery 💵
</div>

<button class="btn" onclick="checkout()">Order Now</button>

</div>

<footer>© 2026 Jovan's Store 🔥</footer>

<script>
let cart = {};
let total = 0;
let count = 0;

let delivery = "Free";
let payment = "M-Pesa";

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function addToCart(name,price){
  if(!cart[name]){
    cart[name] = {price:price, qty:1};
  }else{
    cart[name].qty++;
  }
  updateCart();
}

function updateCart(){
  let html = "";
  total = 0;
  count = 0;

  for(let item in cart){
    let p = cart[item];
    total += p.price * p.qty;
    count += p.qty;

    html += `
    <div>
      <p>${item} (x${p.qty})</p>
      <div class="qty">
        <button onclick="changeQty('${item}',-1)">-</button>
        <button onclick="changeQty('${item}',1)">+</button>
      </div>
    </div>
    `;
  }

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = count;
}

function changeQty(name,val){
  cart[name].qty += val;
  if(cart[name].qty <= 0){
    delete cart[name];
  }
  updateCart();
}

function selectDelivery(val,el){
  delivery = val;
  document.querySelectorAll("h3:nth-of-type(1) + .option, h3:nth-of-type(1) + .option + .option")
    .forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
}

function selectPayment(val,el){
  payment = val;
  document.querySelectorAll("h3:nth-of-type(2) + .option, h3:nth-of-type(2) + .option + .option")
    .forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
}

function checkout(){
  let msg = "🛒 ORDER:%0A";

  for(let item in cart){
    msg += item + " x" + cart[item].qty + "%0A";
  }

  msg += "%0AItems: " + count;
  msg += "%0ATOTAL: " + total + " Tsh";
  msg += "%0ADelivery: " + delivery;
  msg += "%0APayment: " + payment;

  window.open("https://wa.me/255617816758?text="+msg);
}

function search(val){
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.dataset.name.toLowerCase().includes(val.toLowerCase())
    ? "block" : "none";
  });
}
</script>

</body>
</html>
