<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Corner Shop</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(45deg, red, blue);
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}
.search input{
  width:90%;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(255,0,0,0.3);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  color:yellow;
}

.btn{
  background:red;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  color:white;
}

/* CART BUTTON */
.cart-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:red;
  padding:10px;
  border-radius:50%;
  border:none;
  z-index:1000;
}

/* CART */
.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:260px;
  height:100%;
  background:black;
  padding:15px;
  transition:0.4s;
}

.cart.active{
  right:0;
}

.total{
  color:yellow;
  font-size:18px;
}

/* PAYMENT */
.checkout{
  margin-top:10px;
  background:green;
  padding:10px;
  border:none;
  width:100%;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:black;
}
</style>

</head>

<body>

<header>🔥 JOVAN'S CORNER SHOP 👟</header>

<button class="cart-btn" onclick="toggleCart()">🛒</button>

<div class="search">
<input placeholder="Search shoes...">
</div>

<div class="products">

<div class="card">
<img src="https://picsum.photos/200?1">
<h3>Nike</h3>
<p>50,000 Tsh</p>
<button class="btn" onclick="addToCart('Nike',50000)">Add</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?2">
<h3>Adidas</h3>
<p>60,000 Tsh</p>
<button class="btn" onclick="addToCart('Adidas',60000)">Add</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?3">
<h3>Puma</h3>
<p>40,000 Tsh</p>
<button class="btn" onclick="addToCart('Puma',40000)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>🛒 Cart</h2>
<div id="items"></div>
<p class="total">Total: <span id="total">0</span> Tsh</p>

<button class="checkout" onclick="checkout()">Pay / Order</button>
</div>

<footer>
© 2026 Jovan's Corner 🔥
</footer>

<script>
let cart = [];
let total = 0;

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function addToCart(name,price){
  cart.push(name + " - " + price + " Tsh");
  total += price;

  document.getElementById("items").innerHTML += "<p>"+name+"</p>";
  document.getElementById("total").innerText = total;
}

/* PAYMENT + WHATSAPP */
function checkout(){
  let msg = "ORDER:%0A";
  cart.forEach(item=>{
    msg += item + "%0A";
  });
  msg += "TOTAL: " + total + " Tsh";

  window.open("https://wa.me/255617816758?text="+msg);
}
</script>

</body>
</html>
