<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Corner</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}

/* HEADER */
header{background:linear-gradient(90deg,red,blue);padding:10px}
.top{display:flex;justify-content:space-between;align-items:center}

/* SEARCH */
.search input{width:100%;padding:10px;border-radius:20px;border:none}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;padding:10px;border-radius:15px}
.card img{width:100%;border-radius:10px}
.card h3{color:yellow}

/* BUTTON */
.btn{background:red;border:none;padding:10px;width:100%;border-radius:10px;color:white}

/* CART */
.cart{position:fixed;right:-100%;top:0;width:100%;max-width:350px;height:100%;background:black;padding:15px;transition:0.3s}
.cart.active{right:0}

/* FLOAT BUTTON */
.float{position:fixed;top:10px;right:10px;background:red;color:white;padding:10px;border-radius:50%}

/* WHATSAPP */
.whatsapp{position:fixed;bottom:20px;right:20px;background:green;color:white;padding:15px;border-radius:50px;text-decoration:none}

/* DASHBOARD */
#dashboard{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;overflow:auto}
</style>

</head>

<body>

<header>
<div class="top">
<b>JOVAN'S CORNER</b>
<button onclick="openDashboard()">📦 Orders</button>
</div>
</header>

<div class="search">
<input type="text" placeholder="Search shoes..." onkeyup="searchProduct(this.value)">
</div>

<div class="products" id="products"></div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Cart <span onclick="toggleCart()">❌</span></h2>

<div id="cartItems"></div>

<p>Total: <span id="total">0</span> Tsh</p>

<button class="btn" onclick="order()">Order</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Orders Dashboard ❌ <span onclick="closeDashboard()">Close</span></h2>
<div id="history"></div>
</div>

<button class="float" onclick="toggleCart()">🛒</button>

<a href="https://wa.me/255617816758" class="whatsapp">💬</a>

<script>

/* REAL PRODUCTS */
let products=[
{name:"Nike Air Max",price:50000,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{name:"Adidas Ultraboost",price:65000,img:"https://images.unsplash.com/photo-1528701800489-20be3c5c9f49"},
{name:"Puma RS-X",price:55000,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{name:"Jordan 1 Retro",price:75000,img:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"},
{name:"Nike Revolution",price:40000,img:"https://images.unsplash.com/photo-1514989940723-e8e51635b782"},
{name:"Adidas Runfalcon",price:42000,img:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a"}
];

let cart=[];
let orders=[];

/* LOAD */
function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
loadProducts();

/* ADD */
function add(i){
cart.push(products[i]);
updateCart();
}

/* UPDATE */
function updateCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.price;
html+=`<p>${p.name}</p>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* ORDER */
function order(){
let text="ORDER:%0A";
let save="";

cart.forEach(p=>{
text+=p.name+" - "+p.price+" Tsh%0A";
save+=p.name+" - Pending<br>";
});

orders.push(save);

document.getElementById("history").innerHTML=orders.join("<hr>");

window.open("https://wa.me/255617816758?text="+text);
}

/* DASHBOARD */
function openDashboard(){
document.getElementById("dashboard").style.display="block";
}
function closeDashboard(){
document.getElementById("dashboard").style.display="none";
}

/* SEARCH */
function searchProduct(val){
let filtered=products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
let html="";
filtered.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} Tsh</p>
<button class="btn" onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

</script>

</body>
</html>
