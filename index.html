<!DOCTYPE html>
<html>
<head>
<title>J&E Hub</title>

<style>

/* BACKGROUND ANIMATION */
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#ff0080,#00ffff,#ff8c00,#3333ff);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
animation:fadeIn 2s;
}

/* CONTAINER */
.container{padding:15px}

/* CARD */
.card{
background:rgba(0,0,0,0.5);
border-radius:15px;
padding:15px;
margin-bottom:15px;
animation:slideUp 1s;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* TITLE GLOW */
h3{
color:#fff;
text-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

/* TEXTAREA */
textarea{
width:100%;
height:80px;
border:none;
border-radius:10px;
padding:10px;
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#ff00cc,#3333ff);
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:10px;
color:white;
font-weight:bold;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* FLOATING BALLS */
.ball{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
opacity:0.5;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* ANIMATIONS */
@keyframes slideUp{
from{transform:translateY(50px);opacity:0}
to{transform:translateY(0);opacity:1}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<header>💪 JOVAN & EVANCE HUB 🔥</header>

<!-- FLOATING EFFECT -->
<div class="ball" style="left:10%;animation-duration:8s;"></div>
<div class="ball" style="left:30%;animation-duration:12s;"></div>
<div class="ball" style="left:60%;animation-duration:10s;"></div>
<div class="ball" style="left:80%;animation-duration:15s;"></div>

<div class="container">

<div class="card">
<h3>🤝 Brotherhood</h3>
<p>Rafiki wa kweli anakusimamia hata wengine wakikuacha.</p>
</div>

<div class="card">
<h3>❤️ Relationship</h3>
<p>Usikimbilie mapenzi bila kujijua kwanza bro...</p>
</div>

<div class="card">
<h3>🧠 Advice</h3>
<p>Focus na maisha yako, pesa itakuja baadaye 💯</p>
</div>

<!-- POST -->
<div class="card">
<h3>✍️ Post Something</h3>
<textarea id="text" placeholder="Andika mawazo yako..."></textarea>
<button class="btn" onclick="post()">🚀 Post</button>
</div>

<div id="posts"></div>

</div>

<script>

function post(){
let t=document.getElementById("text").value;

if(t===""){
alert("Andika kitu bro");
return;
}

let post=`
<div class="card">
<h3>🔥 New Post</h3>
<p>${t}</p>
</div>
`;

document.getElementById("posts").innerHTML+=post;

document.getElementById("text").value="";
}

</script>

</body>
</html>
