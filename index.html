<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan's Shoe Store</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0a0a;
  color:white;
}

header{
  background:linear-gradient(45deg, red, blue);
  padding:15px;
  text-align:center;
  font-size:22px;
}

/* SEARCH */
.search{
  padding:10px;
  text-align:center;
}
.search input{
  width:90%;
  padding:10px;
  border-radius:20px;
  border:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  color:yellow;
}

/* BUTTON */
.btn{
  background:red;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  color:white;
}

/* CART */
.cart-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:red;
  padding:10px;
  border-radius:50%;
}

.cart{
  position:fixed;
  top:0;
  right:-100%;
  width:280px;
  height:100%;
  background:black;
  padding:15px;
  transition:0.4s;
  overflow:auto;
}

.cart.active{
  right:0;
}

.total{
  color:yellow;
  font-size:18px;
}

/* QUANTITY */
.qty button{
  padding:5px;
  margin:3px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:black;
}
</style>

</head>

<body>

<header>👟 JOVAN'S SHOE STORE</header>

<button class="cart-btn" onclick="toggleCart()">🛒</button>

<div class="search">
<input placeholder="Search shoes..." onkeyup="search(this.value)">
</div>

<div class="products" id="products">

<div class="card" data-name="Nike">
<img src="https://picsum.photos/200?1">
<h3>Nike</h3>
<p>50000 Tsh</p>
<button class="btn" onclick="addToCart('Nike',50000)">Add</button>
</div>

<div class="card" data-name="Adidas">
<img src="https://picsum.photos/200?2">
<h3>Adidas</h3>
<p>60000 Tsh</p>
<button class="btn" onclick="addToCart('Adidas',60000)">Add</button>
</div>

<div class="card" data-name="Puma">
<img src="https://picsum.photos/200?3">
<h3>Puma</h3>
<p>40000 Tsh</p>
<button class="btn" onclick="addToCart('Puma',40000)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>🛒 Cart</h2>

<div id="items"></div>

<p>Items: <span id="count">0</span></p>
<p class="total">Total: <span id="total">0</span> Tsh</p>

<hr>

<h3>🚚 Delivery</h3>
<select id="delivery">
<option value="Free">Free</option>
<option value="5000">City Delivery - 5000 Tsh</option>
</select>

<h3>💳 Payment</h3>
<select id="payment">
<option value="M-Pesa">M-Pesa</option>
<option value="Cash">Cash</option>
</select>

<button class="btn" onclick="checkout()">Order</button>
</div>

<footer>© 2026 Jovan's Store 🔥</footer>

<script>
let cart = {};
let total = 0;
let count = 0;

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function addToCart(name,price){
  if(!cart[name]){
    cart[name] = {price:price, qty:1};
  }else{
    cart[name].qty++;
  }
  updateCart();
}

function updateCart(){
  let itemsHTML = "";
  total = 0;
  count = 0;

  for(let item in cart){
    let p = cart[item];
    total += p.price * p.qty;
    count += p.qty;

    itemsHTML += `
    <div>
      <p>${item} (${p.qty})</p>
      <div class="qty">
        <button onclick="changeQty('${item}',-1)">-</button>
        <button onclick="changeQty('${item}',1)">+</button>
      </div>
    </div>
    `;
  }

  document.getElementById("items").innerHTML = itemsHTML;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = count;
}

function changeQty(name,val){
  cart[name].qty += val;
  if(cart[name].qty <= 0){
    delete cart[name];
  }
  updateCart();
}

function checkout(){
  let delivery = document.getElementById("delivery").value;
  let payment = document.getElementById("payment").value;

  let msg = "🛒 ORDER:%0A";

  for(let item in cart){
    msg += item + " x" + cart[item].qty + "%0A";
  }

  msg += "Items: " + count + "%0A";
  msg += "TOTAL: " + total + " Tsh%0A";
  msg += "Delivery: " + delivery + "%0A";
  msg += "Payment: " + payment;

  window.open("https://wa.me/255617816758?text="+msg);
}

function search(value){
  let cards = document.querySelectorAll(".card");
  cards.forEach(card=>{
    if(card.dataset.name.toLowerCase().includes(value.toLowerCase())){
      card.style.display="block";
    }else{
      card.style.display="none";
    }
  });
}
</script>

</body>
  </html>
