<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan News Live</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

header{background:#b80000;padding:12px;text-align:center;font-weight:bold}

.breaking{background:black;color:red;padding:10px;text-align:center}

.news{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

.card{background:#222;border-radius:10px;overflow:hidden}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:10px;font-size:14px}

.full{position:fixed;top:0;left:0;width:100%;height:100%;background:black;padding:20px;display:none;overflow:auto}

.btn{background:red;color:white;border:none;padding:10px;width:100%;border-radius:10px}
</style>

</head>
<body>

<header>📰 JOVAN NEWS LIVE</header>

<div class="breaking">🚨 LIVE GLOBAL NEWS 🌍</div>

<div class="news" id="news"></div>

<div class="full" id="full">
<button class="btn" onclick="closeFull()">❌ Close</button>
<h2 id="title"></h2>
<img id="image" style="width:100%">
<p id="content"></p>
<a id="link" target="_blank" style="color:yellow">👉 Soma zaidi</a>
</div>

<script>

/* FREE WORKING API */
fetch("https://api.spaceflightnewsapi.net/v4/articles/")
.then(res=>res.json())
.then(data=>{

let html="";

data.results.slice(0,10).forEach((n,i)=>{

html+=`
<div class="card" onclick="openFull(${i})">
<img src="${n.image_url}">
<h3>${n.title}</h3>
</div>
`;

});

window.newsData=data.results;
document.getElementById("news").innerHTML=html;

});

/* OPEN */
function openFull(i){
let n=window.newsData[i];

document.getElementById("full").style.display="block";
document.getElementById("title").innerText=n.title;
document.getElementById("image").src=n.image_url;
document.getElementById("content").innerText=n.summary;
document.getElementById("link").href=n.url;
}

/* CLOSE */
function closeFull(){
document.getElementById("full").style.display="none";
}

</script>

</body>
</html>
