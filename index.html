<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jovan Farm Investment</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}

header{background:green;padding:12px;text-align:center;font-weight:bold}

.container{padding:10px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.card{
background:#222;
border-radius:10px;
padding:10px;
text-align:center;
}

.btn{
background:green;
color:white;
border:none;
padding:10px;
border-radius:10px;
width:100%;
margin-top:10px;
}

/* DASHBOARD */
.dashboard{
background:#000;
padding:10px;
margin-top:10px;
border-radius:10px;
}
</style>

</head>
<body>

<header>🐄 JOVAN FARM INVESTMENT</header>

<div class="container">

<h3>Chagua Uwekezaji</h3>

<div class="grid">

<div class="card">
<h2>🐔 Kuku</h2>
<p>Bei: 200,000 Tsh</p>
<p>Muda: Miezi 3</p>
<button class="btn" onclick="invest('Kuku',200000)">Invest</button>
</div>

<div class="card">
<h2>🐄 Ng'ombe</h2>
<p>Bei: 500,000 Tsh</p>
<p>Muda: Miezi 6</p>
<button class="btn" onclick="invest('Ngombe',500000)">Invest</button>
</div>

</div>

<div class="dashboard">
<h3>📊 Dashboard</h3>
<p id="total">Total Investment: 0 Tsh</p>
<p id="profit">Estimated Profit: 0 Tsh</p>
<p id="list"></p>
</div>

</div>

<script>

let investments = JSON.parse(localStorage.getItem("farm")||"[]");

function invest(type,amount){

let profit = amount * 0.25; // 25% mfano

let data={
type:type,
amount:amount,
profit:profit,
date:new Date().toLocaleDateString()
};

investments.push(data);

localStorage.setItem("farm",JSON.stringify(investments));

updateUI();

alert("Umewekeza kwenye " + type);
}

/* UPDATE */
function updateUI(){

let total=0;
let profit=0;
let list="";

investments.forEach(i=>{
total+=i.amount;
profit+=i.profit;

list+=`
<p>🐾 ${i.type} - ${i.amount} Tsh (Profit: ${i.profit})</p>
`;
});

document.getElementById("total").innerText="Total Investment: "+total+" Tsh";
document.getElementById("profit").innerText="Estimated Profit: "+profit+" Tsh";
document.getElementById("list").innerHTML=list;

}

updateUI();

</script>

</body>
</html>
