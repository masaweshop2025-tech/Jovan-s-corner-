<!DOCTYPE html>
<html>
<head>
<title>J&E Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:bold;
padding:15px;
background:linear-gradient(90deg,#ff00cc,#00ffff,#ff8c00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

/* GLOW */
@keyframes glow{
0%{text-shadow:0 0 5px #ff00cc}
100%{text-shadow:0 0 20px #00ffff}
}

/* SLIDER */
.slider{
width:100%;
height:220px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.active{
opacity:1;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo"> JOVAN & EVANCE </div>

<!-- SLIDER -->
<div class="slider">

<div class="slide active">
<img src="jovan.jpg">
</div>

<div class="slide">
<img src="evance.jpg">
</div>

<div class="slide">
<img src="team.jpg">
</div>

</div>

<script>

/* AUTO SLIDE */
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

</script>

</body>
</html>
