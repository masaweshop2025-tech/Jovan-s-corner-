<!DOCTYPE html>
<html>
<head>
  <title>Jovan's Corner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    .center {
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
    }

    header {
      background: red;
      text-align: center;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .news {
      background: #111;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .news img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: black;
    }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="auth">

  <div class="center">
    <h2>🔥 Jovan's Corner</h2>

    <h3>Login</h3>
    <input type="text" id="loginUser" placeholder="Username"><br>
    <input type="password" id="loginPass" placeholder="Password"><br>
    <button onclick="login()">Login</button>

    <h3>Register</h3>
    <input type="text" id="regUser" placeholder="Username"><br>
    <input type="password" id="regPass" placeholder="Password"><br>
    <button onclick="register()">Register</button>

  </div>

</div>

<!-- MAIN WEBSITE -->
<div id="main" style="display:none;">

<header>🔥 JOVAN'S CORNER</header>

<div class="container">

  <div class="news">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <h2>📰 Habari</h2>
    <p>Karibu kwenye website yako mwenyewe 🔥</p>
  </div>

  <div class="news">
    <img src="https://images.unsplash.com/photo-1508780709619-79562169bc64">
    <h2>⚽ Michezo</h2>
    <p>Updates za mechi hapa.</p>
  </div>

</div>

<footer>
© 2026 Jovan's Corner
</footer>

</div>

<script>

function register() {
  let user = document.getElementById("regUser").value;
  let pass = document.getElementById("regPass").value;

  if(user && pass){
    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);
    alert("Account created!");
  } else {
    alert("Jaza kila kitu");
  }
}

function login() {
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if(user === savedUser && pass === savedPass){
    document.getElementById("auth").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    alert("Wrong login!");
  }
}

</script>

</body>
</html>
